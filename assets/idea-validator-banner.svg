<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="200" fill="url(#bg)" rx="12"/>
  <rect x="0" y="190" width="800" height="10" fill="url(#accent)" rx="0 0 12 12"/>

  <!-- Icon -->
  <circle cx="100" cy="100" r="35" fill="none" stroke="#e94560" stroke-width="3"/>
  <path d="M85 100 L95 110 L115 90" fill="none" stroke="#e94560" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="100" y1="60" x2="100" y2="55" stroke="#e94560" stroke-width="2" stroke-linecap="round"/>
  <line x1="100" y1="145" x2="100" y2="140" stroke="#e94560" stroke-width="2" stroke-linecap="round"/>
  <line x1="55" y1="100" x2="60" y2="100" stroke="#e94560" stroke-width="2" stroke-linecap="round"/>
  <line x1="140" y1="100" x2="145" y2="100" stroke="#e94560" stroke-width="2" stroke-linecap="round"/>

  <!-- Text -->
  <text x="180" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="#ffffff">Idea Validator</text>
  <text x="180" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#a0a0b0">Stress-test your startup idea like a YC partner would.</text>
  <text x="180" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#666680">7 layers of validation  |  Real business math  |  No flattery</text>
</svg>
