<svg xmlns="http://www.w3.org/2000/svg" width="720" height="320" viewBox="0 0 720 320" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', 'Menlo', monospace">
  <style>
    .win-border { fill: none; stroke: #333; stroke-width: 1.5; }
    .win-title { fill: #333; font-size: 10px; font-weight: 600; letter-spacing: 1px; }
    .win-chrome { fill: #666; font-size: 9px; }
    .body-text { fill: #333; font-size: 11px; }
    .accent { fill: #e8590c; }
    .accent-stroke { stroke: #e8590c; }
    .muted { fill: #999; font-size: 10px; }
    .dot { fill: #ccc; }
    .star-dark { fill: #333; }
    .star-accent { fill: #e8590c; }
    .line { stroke: #ddd; stroke-width: 1; }
    .connector { stroke: #ccc; stroke-width: 1; stroke-dasharray: 4,3; }
    .title { fill: #111; font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
    .subtitle { fill: #666; font-size: 12px; }
  </style>

  <!-- Left window: YOUR IDEA -->
  <rect x="20" y="30" width="190" height="140" rx="4" class="win-border"/>
  <text x="30" y="24" class="win-chrome">≡ ×</text>
  <line x1="20" y1="48" x2="210" y2="48" class="line"/>
  <text x="80" y="43" class="win-title">YOUR IDEA</text>

  <text x="34" y="68" class="body-text">"I want to build</text>
  <text x="34" y="82" class="body-text"> a tool that...</text>
  <text x="34" y="96" class="body-text"> for [customer]"</text>

  <text x="34" y="120" class="muted">stage: idea</text>
  <text x="34" y="134" class="muted">discovery: 15 calls</text>
  <text x="34" y="148" class="muted">revenue: pre</text>

  <!-- Connector dots 1 -->
  <line x1="210" y1="100" x2="252" y2="100" class="connector"/>
  <text x="218" y="94" class="muted">····▶</text>

  <!-- Center window: AI COFOUNDER -->
  <rect x="252" y="15" width="216" height="175" rx="4" class="win-border"/>
  <text x="262" y="9" class="win-chrome">≡ ×</text>
  <line x1="252" y1="33" x2="468" y2="33" class="line"/>
  <text x="302" y="28" class="win-title" class="accent">AI COFOUNDER</text>

  <!-- Stars scatter (like e2b) -->
  <text x="276" y="56" class="star-dark" font-size="11">✦</text>
  <text x="310" y="50" class="star-accent" font-size="9">✦</text>
  <text x="340" y="62" class="star-dark" font-size="13">✦</text>
  <text x="295" y="74" class="star-accent" font-size="10">✦</text>
  <text x="370" y="52" class="star-dark" font-size="8">✦</text>
  <text x="420" y="58" class="star-accent" font-size="11">✦</text>
  <text x="440" y="70" class="star-dark" font-size="9">✦</text>
  <text x="355" y="80" class="star-accent" font-size="12">✦</text>
  <text x="265" y="90" class="star-dark" font-size="8">✦</text>
  <text x="400" y="86" class="star-dark" font-size="10">✦</text>
  <text x="325" y="95" class="star-accent" font-size="14">✦</text>
  <text x="380" y="100" class="star-dark" font-size="9">✦</text>
  <text x="300" y="108" class="star-accent" font-size="8">✦</text>
  <text x="450" y="94" class="star-accent" font-size="10">✦</text>
  <text x="345" y="112" class="star-dark" font-size="11">✦</text>
  <text x="415" y="110" class="star-accent" font-size="8">✦</text>

  <!-- Labels inside center -->
  <text x="270" y="135" class="muted">L1 ░ problem</text>
  <text x="270" y="147" class="muted">L2 ░ market</text>
  <text x="270" y="159" class="muted">L3 ░ solution</text>
  <text x="270" y="171" class="muted">L4 ░ economics</text>
  <text x="370" y="135" class="muted">L5 ░ P&amp;L</text>
  <text x="370" y="147" class="muted">L6 ░ timing</text>
  <text x="370" y="159" class="muted">L7 ░ founder</text>
  <text x="370" y="171" class="muted">L8 ░ traction</text>

  <!-- Loading bar -->
  <rect x="290" y="180" width="140" height="4" rx="2" fill="#eee"/>
  <rect x="290" y="180" width="95" height="4" rx="2" fill="#e8590c"/>

  <!-- Connector dots 2 -->
  <line x1="468" y1="100" x2="510" y2="100" class="connector"/>
  <text x="476" y="94" class="muted">····▶</text>

  <!-- Right window: SCORECARD -->
  <rect x="510" y="30" width="190" height="140" rx="4" class="win-border"/>
  <text x="520" y="24" class="win-chrome">≡ ×</text>
  <line x1="510" y1="48" x2="700" y2="48" class="line"/>
  <text x="565" y="43" class="win-title">SCORECARD</text>

  <!-- Bar chart -->
  <text x="524" y="65" class="muted">5 ┤</text>
  <rect x="550" y="56" width="14" height="40" rx="1" fill="#e8590c" opacity="0.8"/>
  <rect x="570" y="66" width="14" height="30" rx="1" fill="#333" opacity="0.5"/>
  <rect x="590" y="76" width="14" height="20" rx="1" fill="#e8590c" opacity="0.8"/>
  <rect x="610" y="56" width="14" height="40" rx="1" fill="#333" opacity="0.5"/>
  <rect x="630" y="66" width="14" height="30" rx="1" fill="#e8590c" opacity="0.8"/>
  <rect x="650" y="76" width="14" height="20" rx="1" fill="#333" opacity="0.5"/>
  <rect x="670" y="56" width="14" height="40" rx="1" fill="#e8590c" opacity="0.8"/>

  <text x="524" y="105" class="muted">1 ┤</text>
  <line x1="544" y1="96" x2="690" y2="96" stroke="#eee" stroke-width="0.5"/>

  <text x="524" y="120" class="body-text">22/40</text>
  <text x="524" y="134" class="muted">2 gaps identified</text>
  <text x="524" y="148" class="muted">kill risk: moat</text>
  <text x="524" y="162" class="muted">verdict: conditional</text>

  <!-- Bottom section: title + tagline -->
  <text x="360" y="235" text-anchor="middle" class="title">AI Cofounder</text>
  <text x="360" y="258" text-anchor="middle" class="subtitle">The world's most advanced AI skill for startup idea validation</text>

  <!-- Bottom tags -->
  <text x="360" y="285" text-anchor="middle" class="muted">7 layers  ·  9 frameworks  ·  8 business models  ·  real math  ·  no flattery</text>

  <!-- Bottom decorative dots -->
  <text x="310" y="305" class="star-accent" font-size="6">✦</text>
  <text x="330" y="308" class="star-dark" font-size="5">✦</text>
  <text x="350" y="303" class="star-accent" font-size="7">✦</text>
  <text x="370" y="309" class="star-dark" font-size="5">✦</text>
  <text x="390" y="304" class="star-accent" font-size="6">✦</text>
  <text x="410" y="307" class="star-dark" font-size="5">✦</text>
</svg>
